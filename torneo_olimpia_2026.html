<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Olimpia 2026 · Fantasy Skate</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fs-dark:#0D3B6E;--fs-blue:#1565C0;--fs-light:#90CAF9;
    --bg:#07111F;--card:#0D1F36;--card2:#102540;
    --border:rgba(144,202,249,0.12);--text:#E8F4FF;--muted:#7BA8CC;
    --U6:#90CAF9;--U6bg:rgba(144,202,249,0.15);
    --U8:#64B5F6;--U8bg:rgba(100,181,246,0.15);
    --U10:#42A5F5;--U10bg:rgba(66,165,245,0.15);
    --U12:#1E88E5;--U12bg:rgba(30,136,229,0.15);
    --U14:#1565C0;--U14bg:rgba(21,101,192,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    background-image:radial-gradient(ellipse at 15% 0%,rgba(21,101,192,.15) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(13,59,110,.2) 0%,transparent 55%)}
  header{padding:22px 32px 14px;border-bottom:2px solid var(--fs-blue);position:relative}
  header::before{content:'🏒';position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:70px;opacity:.05}
  .hrow{display:flex;align-items:center;gap:14px}
  .logo{width:46px;height:46px;background:linear-gradient(135deg,var(--fs-blue),var(--fs-dark));
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;
    box-shadow:0 4px 16px rgba(21,101,192,.5)}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(20px,4vw,36px);
    text-transform:uppercase;letter-spacing:.02em;line-height:1}
  h1 em{font-style:normal;color:var(--fs-light)}
  .sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.12em;text-transform:uppercase}
  .pills{display:flex;flex-wrap:wrap;gap:8px;padding:12px 32px;border-bottom:1px solid var(--border)}
  .pill{padding:5px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;
    font-size:13px;letter-spacing:.05em;cursor:pointer;transition:all .2s;border:2px solid transparent}
  .pill-all{background:rgba(255,255,255,.07);color:var(--text);border-color:rgba(255,255,255,.12)}
  .pill-U6{background:var(--U6bg);color:var(--U6);border-color:rgba(144,202,249,.25)}
  .pill-U8{background:var(--U8bg);color:var(--U8);border-color:rgba(100,181,246,.25)}
  .pill-U10{background:var(--U10bg);color:var(--U10);border-color:rgba(66,165,245,.25)}
  .pill-U12{background:var(--U12bg);color:var(--U12);border-color:rgba(30,136,229,.25)}
  .pill-U14{background:var(--U14bg);color:var(--U14);border-color:rgba(21,101,192,.3)}
  .pill.active{box-shadow:0 0 10px currentColor;transform:scale(1.05)}
  .sbar{padding:10px 32px;border-bottom:1px solid var(--border)}
  .sw{position:relative;max-width:380px}
  .sw input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:8px 12px 8px 34px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border .2s}
  .sw input:focus{border-color:var(--fs-light)}
  .sw::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
  main{padding:18px 32px}
  .stats-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 16px;text-align:center;min-width:72px}
  .stat .n{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
  .cat-section{margin-bottom:28px}
  .cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .cbadge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;padding:3px 12px;border-radius:16px;letter-spacing:.05em}
  .cb-U6{background:var(--U6bg);color:var(--U6)}.cb-U8{background:var(--U8bg);color:var(--U8)}
  .cb-U10{background:var(--U10bg);color:var(--U10)}.cb-U12{background:var(--U12bg);color:var(--U12)}
  .cb-U14{background:var(--U14bg);color:var(--U14)}
  .cfmt{font-size:12px;color:var(--muted)}.ccount{font-size:12px;color:var(--muted);margin-left:auto}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .tcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
  .tcard:hover{border-color:var(--fs-light)}
  .thdr{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .ticon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .tname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.03em}
  .tsub{font-size:10px;color:var(--muted);margin-top:1px}
  .plist{padding:6px 0}
  .prow{display:flex;align-items:center;gap:7px;padding:5px 14px;transition:background .1s}
  .prow:hover{background:rgba(255,255,255,.04)}
  .pnum{font-size:10px;color:var(--muted);width:14px;text-align:right;flex-shrink:0}
  .pgender{font-size:12px;flex-shrink:0}
  .pname{font-size:13px;flex:1}
  .ppuesto{font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--muted);flex-shrink:0}
  .ppuesto.arch{background:rgba(144,202,249,.15);color:var(--fs-light)}
  .empty{text-align:center;padding:48px;color:var(--muted)}
  @media(max-width:580px){header,.pills,.sbar,main{padding-left:14px;padding-right:14px}.tgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo">🏒</div>
    <div>
      <h1>Torneo <em>Olimpia</em></h1>
      <div class="sub">Fantasy Skate · Buenos Aires · 1 de Mayo 2026</div>
    </div>
  </div>
</header>
<div class="pills" id="pills">
  <button class="pill pill-all active" onclick="filterCat('all',this)">Todos</button>
  <button class="pill pill-U6"  onclick="filterCat('U6',this)">U6</button>
  <button class="pill pill-U8"  onclick="filterCat('U8',this)">U8</button>
  <button class="pill pill-U10" onclick="filterCat('U10',this)">U10</button>
  <button class="pill pill-U12" onclick="filterCat('U12',this)">U12</button>
  <button class="pill pill-U14" onclick="filterCat('U14',this)">U14</button>
</div>
<div class="sbar"><div class="sw"><input type="text" id="q" placeholder="Buscar jugador o equipo..." oninput="render()"></div></div>
<main>
  <div class="stats-row" id="stats"></div>
  <div id="content"></div>
</main>
<script>
const ICONS={U6:'🐣',U8:'🐧',U10:'🐺',U12:'🦅',U14:'🦁'};
const data=[
  {cat:'U6',fmt:'3 vs 3',teams:[
    {nombre:'Fantasy U6',jugadores:[
      {n:'Kimey',a:'Giustina Link',g:'♀',p:'Arquera'},
      {n:'Boris',a:'Haroshka',g:'♂',p:'Jugador'},
      {n:'Bautista',a:'de Luca',g:'♂',p:'Jugador'},
      {n:'Alba',a:'Zurlo',g:'♀',p:'Jugador'},
      {n:'Franco',a:'Hilara',g:'♂',p:'Jugador'},
    ]}
  ]},
  {cat:'U8',fmt:'3 vs 3',teams:[
    {nombre:'Osos Azules',jugadores:[
      {n:'Sofia',a:'Quineteros Beraldi',g:'♀',p:'Arquero'},
      {n:'Simón',a:'Boesing',g:'♂',p:'Jugador'},
      {n:'Tomas',a:'Carrizo',g:'♂',p:'Jugador'},
      {n:'Valentino',a:'Di Chiara',g:'♂',p:'Jugador'},
      {n:'Galo',a:'Oliver',g:'♂',p:'Jugador'},
      {n:'Alex',a:'Toloza',g:'♂',p:'Jugador'},
      {n:'Franco',a:'Hilara',g:'♂',p:'Jugador'},
    ]},
    {nombre:'Delfines Azules',jugadores:[
      {n:'Julieta',a:'Saurina',g:'♀',p:'Jugador'},
      {n:'Amine',a:'Hamoud',g:'♀',p:'Jugador'},
      {n:'Martina',a:'Arellano',g:'♀',p:'Jugador'},
      {n:'Donnatella',a:'Ibarra',g:'♀',p:'Jugador'},
      {n:'Leticia',a:'Sagasti',g:'♀',p:'Jugador'},
      {n:'Kimey',a:'Giustina Link',g:'♀',p:'Jugador'},
      {n:'Alma',a:'González',g:'♀',p:'Jugador'},
      {n:'Luz',a:'Mendez Paz',g:'♀',p:'Jugador'},
    ]}
  ]},
  {cat:'U10',fmt:'3 vs 3',teams:[
    {nombre:'Lobos Azules',jugadores:[
      {n:'Mario',a:'Castillo',g:'♂',p:'Arquero'},
      {n:'Alexandra',a:'Arellano',g:'♀',p:'Jugador'},
      {n:'Abigail Ailín',a:'Maidana',g:'♀',p:'Jugador'},
      {n:'Zamira',a:'Morinigo Portillo',g:'♀',p:'Jugador'},
      {n:'Máximo',a:'Demczuk',g:'♂',p:'Jugador'},
      {n:'Julieta',a:'Saurina',g:'♀',p:'Jugador'},
      {n:'Alma',a:'González',g:'♀',p:'Arquera'},
      {n:'Juan Ignacio',a:'Juarez',g:'♂',p:'Jugador'},
      {n:'Juan Cruz',a:'Fieg',g:'♂',p:'Jugador'},
    ]},
    {nombre:'Tigres Azules',jugadores:[
      {n:'Andres',a:'Flores',g:'♂',p:'Arquero'},
      {n:'Josías Daniel',a:'Arguello Molina',g:'♂',p:'Jugador'},
      {n:'Benjamín',a:'Salomón',g:'♂',p:'Jugador'},
      {n:'Santino',a:'Dal Canton',g:'♂',p:'Jugador'},
      {n:'Damaris',a:'Torrico',g:'♀',p:'Jugador'},
      {n:'Maria',a:'Ortiz Autiero',g:'♀',p:'Jugador'},
      {n:'Jose Nicolas',a:'Sanchez Diaz',g:'♂',p:'Jugador'},
      {n:'Azarel Maximiliano',a:'Barreto Aquino',g:'♂',p:'Jugador'},
      {n:'Santiago',a:'Farias',g:'♂',p:'Jugador'},
    ]},
    {nombre:'Aves Azules',jugadores:[
      {n:'Amira',a:'Villalba',g:'♀',p:'Jugador'},
      {n:'Ludmila',a:'Telis Galfrascoli',g:'♀',p:'Jugador'},
      {n:'Sofia',a:'Quineteros Beraldi',g:'♀',p:'Jugador'},
      {n:'Ariadna',a:'Coman',g:'♀',p:'Jugador'},
      {n:'Emma',a:'Oliver',g:'♀',p:'Jugador'},
      {n:'Pedro Noah',a:'Bezenzette',g:'♂',p:'Jugador'},
      {n:'Francesca',a:'Gallardo',g:'♀',p:'Jugador'},
      {n:'Ian Tobias',a:'González Álvarez',g:'♂',p:'Jugador'},
      {n:'Maximo',a:'Gordillo',g:'♂',p:'Jugador'},
    ]}
  ]},
  {cat:'U12',fmt:'5 vs 5',teams:[
    {nombre:'Fantasy U12',jugadores:[
      {n:'Salvador',a:'Lorenzo',g:'♂',p:'Arquero'},
      {n:'Máximo',a:'Demczuk',g:'♂',p:'Jugador'},
      {n:'Alexandra',a:'Arellano',g:'♀',p:'Jugador'},
      {n:'Abigail Ailín',a:'Maidana',g:'♀',p:'Jugador'},
      {n:'Zamira',a:'Morinigo Portillo',g:'♀',p:'Jugador'},
      {n:'Julieta',a:'Saurina',g:'♀',p:'Jugador'},
      {n:'Martina Isabella',a:'Gramajo',g:'♀',p:'Jugador'},
      {n:'Juan Ignacio',a:'Juarez',g:'♂',p:'Jugador'},
      {n:'Francisco',a:'Passalacqua',g:'♂',p:'Jugador'},
      {n:'Francisco',a:'Ponce',g:'♂',p:'Jugador'},
      {n:'Juan',a:'Ferrando Solari',g:'♂',p:'Jugador'},
      {n:'Benjamin',a:'Sánchez Laffont',g:'♂',p:'Jugador'},
      {n:'Matteo',a:'Sedran',g:'♂',p:'Jugador'},
    ]}
  ]},
  {cat:'U14',fmt:'5 vs 5',teams:[
    {nombre:'Fantasy U14',jugadores:[
      {n:'Salvador',a:'Lorenzo',g:'♂',p:'Arquero'},
      {n:'Páula',a:'Ferrando Solari',g:'♀',p:'Jugador'},
      {n:'Francisco',a:'Passalacqua',g:'♂',p:'Jugador'},
      {n:'Francisco',a:'Ponce',g:'♂',p:'Jugador'},
      {n:'Juan',a:'Ferrando Solari',g:'♂',p:'Jugador'},
      {n:'Matteo',a:'Sedran',g:'♂',p:'Jugador'},
      {n:'Benjamin',a:'Sánchez Laffont',g:'♂',p:'Jugador'},
    ]}
  ]}
];
 
let currentCat='all';
function filterCat(cat,btn){currentCat=cat;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');render();}
 
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const uniqueJ=new Set(data.flatMap(c=>c.teams.flatMap(t=>t.jugadores.map(j=>j.n+' '+j.a)))).size;
  const totalSlots=data.reduce((s,c)=>s+c.teams.reduce((ss,t)=>ss+t.jugadores.length,0),0);
  const totalE=data.reduce((s,c)=>s+c.teams.length,0);
  let sh=`<div class="stat"><div class="n" style="color:var(--fs-light)">${uniqueJ}</div><div class="l">Jugadores</div></div>
    <div class="stat"><div class="n" style="color:var(--muted)">${totalSlots}</div><div class="l">Inscripciones</div></div>
    <div class="stat"><div class="n" style="color:var(--U8)">${totalE}</div><div class="l">Equipos</div></div>`;
  ['U6','U8','U10','U12','U14'].forEach(c=>{
    const cat=data.find(d=>d.cat===c);if(!cat)return;
    const n=cat.teams.reduce((s,t)=>s+t.jugadores.length,0);
    sh+=`<div class="stat"><div class="n" style="color:var(--${c})">${n}</div><div class="l">${c}</div></div>`;
  });
  document.getElementById('stats').innerHTML=sh;
 
  const filtered=data.filter(d=>currentCat==='all'||d.cat===currentCat);
  let html='';
  filtered.forEach(cat=>{
    const mteams=cat.teams.map(t=>{
      if(!q)return t;
      if(t.nombre.toLowerCase().includes(q))return t;
      const mj=t.jugadores.filter(j=>(j.n+' '+j.a).toLowerCase().includes(q));
      return mj.length?{...t,jugadores:mj}:null;
    }).filter(Boolean);
    if(!mteams.length)return;
    const tot=mteams.reduce((s,t)=>s+t.jugadores.length,0);
    html+=`<div class="cat-section">
      <div class="cat-hdr">
        <span class="cbadge cb-${cat.cat}">${cat.cat}</span>
        <span class="cfmt">${cat.fmt}</span>
        <span class="ccount">${mteams.length} equipo${mteams.length!==1?'s':''} · ${tot} jugadores</span>
      </div>
      <div class="tgrid">`;
    mteams.forEach(t=>{
      const arch=t.jugadores.filter(j=>j.p.toLowerCase().includes('arquero')||j.p.toLowerCase().includes('arquera')).length;
      html+=`<div class="tcard">
        <div class="thdr">
          <div class="ticon" style="background:var(--${cat.cat}bg)">${ICONS[cat.cat]}</div>
          <div><div class="tname">${t.nombre}</div><div class="tsub">${t.jugadores.length} jugadores · ${arch} arquer${arch!==1?'os':'o'}</div></div>
        </div>
        <div class="plist">`;
      t.jugadores.forEach((j,i)=>{
        const a=j.p.toLowerCase().includes('arquero')||j.p.toLowerCase().includes('arquera');
        html+=`<div class="prow">
          <span class="pnum">${i+1}</span>
          <span class="pgender">${j.g}</span>
          <span class="pname">${j.n} ${j.a}</span>
          <span class="ppuesto ${a?'arch':''}">${j.p}</span>
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  if(!html)html=`<div class="empty">Sin resultados para "${q}"</div>`;
  document.getElementById('content').innerHTML=html;
}
render();
</script>
</body>
</html>
